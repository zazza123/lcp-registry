name: Validate Manifests

# When a pull request adds or changes manifests, make sure every affected
# package has an up-to-date latest.json so the library shows up on the site.
# The fix is committed straight back onto the PR branch — contributors only
# need to drop in the <version>.lcp.json.gz file.

on:
  pull_request:
    paths:
      - 'manifests/**'

permissions:
  contents: write

jobs:
  sync-latest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          # head_ref is only used as a checkout ref (never in a shell command),
          # so it cannot be used for command injection.
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install 'packaging>=24.0' 'pyyaml>=6.0'

      - name: Sync latest.json
        run: python .github/lcp/sync_latest.py

      - name: Commit changes back to the PR
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "latest.json already up-to-date — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests
          git commit \
            -m "ADD: Sync latest.json for manifests in this PR" \
            -m "Auto-generated by the validate-manifests workflow so the registry site reflects the manifests added or updated in this pull request."
          git push
