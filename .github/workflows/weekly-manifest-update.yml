name: Weekly PyPI Manifest Updater

on:
  schedule:
    - cron: '0 5 * * 1'   # Every Monday at 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install -r .github/lcp/requirements.txt

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run manifest updater
        run: |
          python .github/lcp/update_manifests.py

      - name: Push commits
        run: |
          git push

      - name: Summarize results
        if: always()
        run: |
          cat .github/lcp/manifest_update_report.txt || echo 'No report generated.'
